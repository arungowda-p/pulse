<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDK demo — Feature Flags</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['DM Sans', 'system-ui', 'sans-serif'] } } }
    };
  </script>
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <div class="mx-auto max-w-xl px-4 py-10 sm:px-6">
    <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8">
      <h1 class="text-xl font-bold tracking-tight text-slate-900 sm:text-2xl">SDK demo</h1>
      <p class="mt-2 text-slate-600">
        This page evaluates the
        <code class="rounded-md bg-slate-100 px-2 py-0.5 font-mono text-sm font-medium text-slate-800">new-checkout</code>
        flag. Toggle it in the dashboard and refresh this page to see the result.
      </p>
      <a
        href="/"
        class="mt-4 inline-flex items-center gap-2 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm transition-colors hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
      >
        Open dashboard
      </a>

      <div class="mt-8 flex flex-wrap items-center gap-2 rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-4">
        <span class="text-sm font-medium text-slate-600">Flag</span>
        <code class="rounded-md bg-slate-200 px-2 py-1 font-mono text-sm font-medium text-slate-800">new-checkout</code>
        <span class="text-slate-400">:</span>
        <span
          id="result"
          class="rounded-full px-2.5 py-0.5 text-xs font-medium"
          aria-live="polite"
        >…</span>
      </div>
    </div>
  </div>
  <script>
    (async function () {
      var url = '/api/eval/new-checkout';
      if (window.location.port !== '4200') {
        url = (window.location.protocol + '//' + window.location.hostname + ':3001') + '/api/eval/new-checkout';
      }
      try {
        var res = await fetch(url);
        var data = await res.json().catch(function() { return {}; });
        var on = data.value === true;
        var el = document.getElementById('result');
        el.textContent = on ? 'ON' : 'OFF';
        el.className = 'rounded-full px-2.5 py-0.5 text-xs font-medium ' + (on ? 'bg-emerald-100 text-emerald-800' : 'bg-slate-200 text-slate-600');
      } catch (e) {
        document.getElementById('result').textContent = 'Error';
        document.getElementById('result').className = 'rounded-full px-2.5 py-0.5 text-xs font-medium bg-red-100 text-red-800';
      }
    })();
  </script>
</body>
</html>
