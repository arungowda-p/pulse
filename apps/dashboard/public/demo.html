<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SDK demo — Feature Flags</title>
  <style>
    body { font-family: system-ui; max-width: 32rem; margin: 2rem auto; padding: 0 1rem; }
    code { background: #1e293b; color: #e2e8f0; padding: 0.2em 0.4em; border-radius: 4px; }
    .on { color: #22c55e; }
    .off { color: #94a3b8; }
  </style>
</head>
<body>
  <h1>SDK demo</h1>
  <p>This page evaluates the <code>new-checkout</code> flag. Toggle it in the <a href="/">dashboard</a> and refresh.</p>
  <p>Flag <code>new-checkout</code>: <strong id="result">…</strong></p>
  <script>
    (async function () {
      const base = window.location.port === '4200' ? 'http://localhost:3000' : '';
      const res = await fetch(base + '/api/eval/new-checkout');
      const data = await res.json().catch(() => ({}));
      const on = data.value === true;
      document.getElementById('result').textContent = on ? 'ON' : 'OFF';
      document.getElementById('result').className = on ? 'on' : 'off';
    })();
  </script>
</body>
</html>
